<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="通过摄像头手势控制的 3D 网页娃娃机原型。"
    />
    <title>手势娃娃机</title>
  </head>
  <body>
    <main id="app" class="shell">
      <section class="machine-panel" aria-label="手势娃娃机游戏区">
        <canvas id="game-canvas" width="1280" height="840"></canvas>
        <div class="scanlines" aria-hidden="true"></div>
      </section>

      <aside class="control-panel" aria-label="游戏状态和控制">
        <div class="brand-block">
          <p class="eyebrow">CAMERA CLAW</p>
          <h1>手势娃娃机</h1>
          <p class="lede">张开手掌开局，移动手掌控制抓手，攥拳下爪。无摄像头时可使用自动演示验证流程。</p>
        </div>

        <div class="status-grid">
          <div>
            <span class="label">阶段</span>
            <strong id="state-label">等待开始</strong>
          </div>
          <div>
            <span class="label">输入</span>
            <strong id="input-label">初始化</strong>
          </div>
          <div>
            <span class="label">手势</span>
            <strong id="gesture-label">未检测</strong>
          </div>
          <div>
            <span class="label">结果</span>
            <strong id="result-label">未开始</strong>
          </div>
        </div>

        <div class="camera-card">
          <video id="camera-video" autoplay playsinline muted></video>
          <canvas id="hand-overlay" width="320" height="240"></canvas>
          <div id="camera-message" class="camera-message">正在准备摄像头...</div>
        </div>

        <div class="meters" aria-label="抓手坐标">
          <div>
            <span>左右</span>
            <meter id="meter-x" min="0" max="1" value="0.5"></meter>
          </div>
          <div>
            <span>前后</span>
            <meter id="meter-y" min="0" max="1" value="0.5"></meter>
          </div>
        </div>

        <div class="actions">
          <button id="demo-button" type="button">自动演示</button>
          <button id="reset-button" type="button">重置</button>
        </div>

        <div class="instructions">
          <p>张开手掌校准位置，攥拳后机器会自动完成下爪、回收和放奖。</p>
          <p>没有摄像头时，点击自动演示可跑完整抓取流程。</p>
        </div>
      </aside>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
